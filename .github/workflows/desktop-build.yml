name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - arch: intel
            runner: macos-13
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app and DMG
        run: pnpm --filter @kanshan/desktop-tauri exec tauri build --target ${{ matrix.target }} --bundles app,dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liu-kanshan-macos-${{ matrix.arch }}
          path: |
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installers
        run: pnpm --filter @kanshan/desktop-tauri exec tauri build --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liu-kanshan-windows-x64
          path: |
            apps/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
