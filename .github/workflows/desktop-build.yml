name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
            pnpm_script: build:macos-aarch64
          - arch: intel
            runner: macos-14
            target: x86_64-apple-darwin
            pnpm_script: build:macos-x64

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Use npm registry
        run: pnpm config set registry https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS app and DMG
        run: pnpm --filter @kanshan/desktop-tauri run ${{ matrix.pnpm_script }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Detect macOS signing status
        id: macos_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -n "$APPLE_CERTIFICATE" && -n "$APPLE_CERTIFICATE_PASSWORD" && -n "$APPLE_SIGNING_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "suffix=signed" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename macOS artifacts
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./apps/desktop-tauri/src-tauri/tauri.conf.json').version")
          bundle_dir="apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          shopt -s nullglob
          for file in "$bundle_dir"/*.dmg; do
            mv "$file" "$bundle_dir/Liu-Kanshan_${version}_macos_${{ matrix.arch }}_${{ steps.macos_signing.outputs.suffix }}.dmg"
          done

      - name: Add macOS signing notice
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./apps/desktop-tauri/src-tauri/tauri.conf.json').version")
          bundle_dir="apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          node scripts/ci/write-macos-signing-note.mjs "$bundle_dir" "$version" "${{ matrix.arch }}" "${{ steps.macos_signing.outputs.suffix }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liu-kanshan-macos-${{ matrix.arch }}
          path: |
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop-tauri/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/README-macos-*.txt
          if-no-files-found: error

  build-windows:
    name: Windows x64
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Use npm registry
        run: pnpm config set registry https://registry.npmjs.org

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows installers
        run: pnpm --filter @kanshan/desktop-tauri run build:windows-nsis

      - name: Rename Windows artifacts
        shell: pwsh
        run: |
          $version = (Get-Content apps/desktop-tauri/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $bundleDir = 'apps/desktop-tauri/src-tauri/target/release/bundle/nsis'
          Get-ChildItem $bundleDir -Filter '*.exe' | ForEach-Object {
            Rename-Item $_.FullName "Liu-Kanshan_$($version)_windows_x64_unsigned.exe" -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liu-kanshan-windows-x64
          path: |
            apps/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.txt
          fail_on_unmatched_files: true
